name: Build and Release
on: [push]
jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build EXE
        run: npm run build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ArchiveSystem
          path: dist/*.exe
